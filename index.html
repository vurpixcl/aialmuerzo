<style>
  :root {
    --vurpix-primary: #111827;
    --vurpix-primary-2: #0f172a;
    --vurpix-text: #1f2937;
    --vurpix-muted: #6b7280;
    --vurpix-bg: #f8fafc;
    --vurpix-surface: #ffffff;
    --vurpix-border: #e5e7eb;
    --vurpix-accent: #2563eb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--vurpix-bg);
    color: var(--vurpix-text);
  }

  .hero {
    background: linear-gradient(135deg, var(--vurpix-primary-2), var(--vurpix-primary));
    color: white;
    padding: 72px 20px 56px;
    text-align: center;
  }

  .hero .eyebrow {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 8px 14px;
    margin-bottom: 18px;
    color: rgba(255,255,255,0.86);
  }

  .hero h1 {
    margin: 0 0 16px;
    font-size: 46px;
    line-height: 1.1;
  }

  .hero p {
    max-width: 780px;
    margin: 0 auto;
    font-size: 18px;
    line-height: 1.6;
    color: rgba(255,255,255,0.88);
  }

  .container {
    max-width: 980px;
    margin: -24px auto 0;
    padding: 0 20px 48px;
  }

  .card {
    background: var(--vurpix-surface);
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 12px 34px rgba(15, 23, 42, 0.10);
  }

  .details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .box {
    background: #f8fafc;
    border: 1px solid var(--vurpix-border);
    border-radius: 14px;
    padding: 18px;
  }

  .box strong {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--vurpix-muted);
  }

  .intro h2,
  .form-header h3 {
    color: var(--vurpix-primary);
  }

  .intro p,
  .form-header p,
  .note,
  .footer-note {
    color: var(--vurpix-muted);
  }

  form {
    display: grid;
    gap: 14px;
    margin-top: 20px;
  }

  input, textarea, select, button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 16px;
    font-family: Arial, sans-serif;
    background: white;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--vurpix-accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }

  button {
    background: var(--vurpix-primary);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s ease;
  }

  button:hover {
    opacity: 0.92;
  }

  @media (max-width: 768px) {
    .hero h1 { font-size: 34px; }
    .hero p { font-size: 17px; }
    .details { grid-template-columns: 1fr; }
    .card { padding: 24px; }
  }
</style>
