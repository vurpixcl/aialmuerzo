<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias | AI Leadership Lunch</title>

  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f4f82;
      --text-soft: #6f8098;
      --vurpix-blue: #1f6ba8;
      --vurpix-cyan: #1aa7d8;
      --shadow: 0 10px 30px rgba(31, 79, 130, 0.10);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eaf2fb, #f5f7fa);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card);
      padding: 40px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      height: 40px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: var(--text-soft);
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .highlight {
      margin-top: 20px;
      padding: 16px;
      background: #f0f6ff;
      border-radius: 12px;
      font-size: 15px;
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #9aa8b6;
    }

    .footer a {
      color: var(--vurpix-blue);
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      <img src="assets/logo-vurpix.png" alt="Vurpix">
    </div>

    <h1>Gracias por tu solicitud</h1>

    <p>
      Hemos recibido tu registro para el <strong>AI Leadership Lunch</strong>.
    </p>

    <p>
      Te contactaremos por WhatsApp para confirmar tu asistencia.
    </p>

    <div class="highlight">
      Recuerda el lugar del evento y que contará con <strong>valet parking disponible</strong>.
    </div>

    <div class="footer">
      © 2026 Vurpix · <a href="https://www.vurpix.com" target="_blank">www.vurpix.com</a>
    </div>

  </div>

</body>
</html>
